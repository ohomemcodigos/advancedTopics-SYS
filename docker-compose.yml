version: '3.8'

services:
  catalog-api:
    build:
      context: ./catalog-service
      dockerfile: Dockerfile
    ports:
      - "5000:3000"
    depends_on:
      - db-catalog

  user-api:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    ports:
      - "5001:3000"

  order-api:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    ports:
      - "5002:3000"

  payment-api:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    ports:
      - "5003:3000"

  db-catalog:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=SuaSenhaForte123
